name: ksbody
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - nodejs>=18          # for frontend build
  - pip:
    - watchdog>=4.0
    - sqlalchemy>=2.0
    - pymysql>=1.1
    - python-dotenv>=1.0
    - fastapi>=0.115
    - uvicorn[standard]>=0.34
    - pydantic>=2.0
    - -e .              # install ksbody package in editable mode
